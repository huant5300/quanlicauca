<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo cáo doanh thu — Fishing Master</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="icon" href="assets/images/app-logo.png" type="image/png">
  <style>
    .report-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .report-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px; backdrop-filter: blur(10px); margin-bottom: 24px; }
    .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
    .report-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 800; color: var(--gold-400); }
    .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .report-stat { padding: 20px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); position: relative; }
    .report-stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; }
    .report-stat.income::before { background: var(--green-500); }
    .report-stat.expense::before { background: var(--red-500); }
    .stat-label { font-size: 0.75rem; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; font-weight: 700; color: var(--white); }
    .income .stat-value { color: var(--green-400); }
    .expense .stat-value { color: var(--red-400); }
    .table-container { overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--glass-border); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 14px 16px; background: rgba(0,0,0,0.2); color: var(--gold-400); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; border-bottom: 1px solid var(--glass-border); }
    td { padding: 14px 16px; border-bottom: 1px solid var(--glass-border); font-size: 0.9rem; color: var(--gray-200); }
    tr:last-child td { border-bottom: none; }
    .tag-completed { background: rgba(34,197,94,0.15); color: var(--green-400); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(34,197,94,0.2); }
    .btn-back { display: inline-flex; align-items: center; gap: 8px; color: var(--gray-400); text-decoration: none; font-weight: 500; margin-bottom: 24px; transition: var(--transition); font-size: 0.9rem; }
    .btn-back:hover { color: var(--gold-400); transform: translateX(-4px); }
    .report-date { color: var(--gray-400); font-size: 0.9rem; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="dashboard.html" class="topbar-brand">
      <img src="assets/images/app-logo.png" alt="Logo">
      <span>Fishing<span class="highlight">Master</span></span>
    </a>
    <div class="topbar-right">
      <div class="topbar-user">
        <span class="user-name" id="topbar-name">—</span>
        <span class="user-role" id="topbar-role">—</span>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Đăng xuất</button>
    </div>
  </header>

  <main class="report-container">
    <a href="dashboard.html" class="btn-back">← Quay lại Dashboard</a>
    
    <div class="report-card">
      <div class="report-header">
        <h1 class="report-title">📊 Báo cáo doanh thu hôm nay</h1>
        <div class="report-date" id="report-date">--/--/----</div>
      </div>

      <div class="report-grid">
        <div class="report-stat income">
          <div class="stat-label">Tổng doanh thu (Vé + Đồ gọi)</div>
          <div class="stat-value" id="total-revenue">0đ</div>
        </div>
        <div class="report-stat expense">
          <div class="stat-label">Tổng chi trả (Cá thu lại)</div>
          <div class="stat-value" id="total-expense">0đ</div>
        </div>
        <div class="report-stat">
          <div class="stat-label">Lợi nhuận ròng</div>
          <div class="stat-value" id="net-profit">0đ</div>
        </div>
        <div class="report-stat">
          <div class="stat-label">Tổng sản lượng cá thu</div>
          <div class="stat-value" id="total-fish">0kg</div>
        </div>
      </div>

      <h2 class="section-title" style="margin-top:0"><span class="icon">📝</span> Chi tiết các ca câu</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Mã ca</th>
              <th>Khách hàng</th>
              <th>Thời gian</th>
              <th>Doanh thu</th>
              <th>Chi trả cá</th>
              <th>Trạng thái</th>
            </tr>
          </thead>
          <tbody id="report-table-body">
            <!-- Data injected here -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/report.js"></script>
</body>
</html>
